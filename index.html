<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>♡ Coquette Tic Tac Toe ♡</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

<!-- Header -->

<div class="header">

<div class="header-top"></div>

<div class="title-box">
🍫 🎀
<h1>Tic Tac Toe</h1>
🎀 🍫
</div>

</div>

<!-- Lace Divider -->

<div class="lace"></div>

<!-- Main -->

<div class="main">

<!-- Left Panel -->

<div class="sidebar">

<div class="profile">

<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400" alt="">

</div>

<div class="menu">

<button>🏠 Home</button>

<button>🎮 New Game</button>

<button>🏆 Score</button>

<button>❔ Help</button>

</div>

<div class="score">

<h3>Score</h3>

<p>Player X : <span id="scoreX">0</span></p>

<p>Player O : <span id="scoreO">0</span></p>

<p>Draws : <span id="draws">0</span></p>

</div>

</div>

<!-- Center -->

<div class="game">

<h2>Let's Play!</h2>

<div id="status">
Player X's Turn
</div>

<div class="board">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

<button id="restart">
Restart Game
</button>

</div>

<!-- Right Panel -->

<div class="info">

<div class="card">

<h3>♡ About ♡</h3>

<p>
Get three in a row to win!
</p>

</div>

<div class="card">

<h3>♡ Rules ♡</h3>

<ul>

<li>Players take turns.</li>

<li>X starts first.</li>

<li>Rows count.</li>

<li>Columns count.</li>

<li>Diagonals count.</li>

</ul>

</div>

</div>

</div>

<!-- Bottom -->

<div class="footer">

<button>Home</button>

<button>About</button>

<button>Contact</button>

</div>

<div class="credit">

♡ Made with love ♡

</div>

</div>

</body>
</html>
