<!DOCTYPE html>
<html>
<head>
<style>

body{
background-color:#ffeaf3;
font-family:Arial,sans-serif;
text-align:center;
}

h2{
color:#d63384;
}

.board{
width:330px;
margin:30px auto;

display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
}

.cell{
width:100px;
height:100px;
background:#ffc9dc;
border:3px solid white;
border-radius:15px;

display:flex;
justify-content:center;
align-items:center;

font-size:55px;
font-weight:bold;

box-shadow:0 4px 8px rgba(0,0,0,0.15);
}

.x{
color:white;
}

.o{
color:#d6336c;
}

</style>
</head>

<body>

<h2>💕 Tic Tac Toe 💕</h2>

<div class="board">

<div class="cell x">X</div>
<div class="cell x">X</div>
<div class="cell o">♥</div>

<div class="cell x">X</div>
<div class="cell o">♥</div>
<div class="cell x">X</div>

<div class="cell o">♥</div>
<div class="cell x">X</div>
<div class="cell x">X</div>

</div>
<script src="script.js"></script>
</body>
</html>
